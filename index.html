    <style>
      #navbar-iframe, .Header, .header, #header, .navbar, .footer-outer, .b-navbar, .comments, .post, .widget {

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, #001f1f, #004d4d);
        font-family: 'Segoe UI', sans-serif;
        color: #fff;
        transition: background 0.4s, color 0.4s;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);

      .header-image {
        width: 200px;

        line-height: 1.5;

      .circle {
        width: 160px;
        height: 160px;
        background: radial-gradient(circle, #66ff99, #009966);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 20px #00ff99;
        transition: transform 0.2s ease;
        animation: glow 2s infinite;
        margin: 0 auto;
        -webkit-tap-highlight-color: transparent;
      }

      .circle:active {
        transform: scale(0.95);
      }

      @keyframes glow {
        0% { box-shadow: 0 0 10px #00ff99; }
        50% { box-shadow: 0 0 25px #00ff99; }
        100% { box-shadow: 0 0 10px #00ff99; }
      }

      .complete {
        margin-top: 20px;
        color: #ccffcc;
        font-size: 18px;
        font-style: italic;
      }

      .buttons {
        margin-top: 25px;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .buttons button {
        background: #008066;
        color: #fff;
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 0 5px #00cc99;
        transition: background 0.3s;
      }

      .buttons button:hover {
        background: #00b386;
      }

      body.dark {
        background: linear-gradient(to bottom, #000000, #1a1a1a);
        color: #ccc;
      }

      body.dark .circle {
        background: radial-gradient(circle, #cccccc, #888);
        box-shadow: 0 0 20px #ffffff;
        color: #000;

      body.dark .complete {
        color: #ddd;
      }

        background: #444;

  <body>
    <main class="container">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhvRJSzAam84Kh6YDvx58-keNRx0j0WlC3Zz1mIDo1eKBJrru6hq9kiz6IjDuUTzmez7-Dbd-95YmUKLI2uNGXRyr-cqOb0Ezsmd5WyvHnd0omZkzJN6GQRPfKEHzPIoEnB714OcResRS5rVYZQge5z4lZL9v5sBKHY0Uz5LikWhCBxCU-_RNqIMh9-MQM/s600/7dc6bda3f26f6096b46c0a3e0dab9287.png" 
           alt="Digital Darood Sharif Counter Icon" class="header-image"/>

      <h1 id="heading">درود شریف کاؤنٹر<br/>Darood Sharif Counter</h1>
      <section class="circle" onclick="incrementCounter()">0</section>
      <div id="message" class="complete"></div>

      <div class="buttons">
        <button onclick="resetCounter()">🔄 Reset</button>
        <button onclick="toggleDarkMode()">🌓 Toggle Mode</button>
        <button onclick="toggleLanguage()">🌐 Switch Language</button>
      </div>

    </main>

    <script>
      let count = 0;
      const maxCount = 80;
      const circle = document.querySelector('.circle');
      const message = document.getElementById('message');
      const heading = document.getElementById('heading');
      let isUrdu = true;

      function incrementCounter() {
        if (count < maxCount) {
          count++;
          circle.textContent = count;
          if (count === maxCount) {
            showCompleteMessage();
          }
        }
      }

      function showCompleteMessage() {
        message.textContent = isUrdu
          ? "ماشاءاللہ! 80 درود شریف مکمل ہوگئے 🌸"
          : "MashaAllah! 80 Darood Sharif completed 🌸";
      }

      function resetCounter() {
        count = 0;
        circle.textContent = 0;
        message.textContent = '';
      }

      function toggleDarkMode() {
        document.body.classList.toggle('dark');
      }

      function toggleLanguage() {
        isUrdu = !isUrdu;
        heading.innerHTML = isUrdu
          ? "درود شریف کاؤنٹر<br/>Darood Sharif Counter"
          : "Darood Sharif Counter<br/>درود شریف کاؤنٹر";
        if (count === maxCount) {
          showCompleteMessage();
        }
      }
    </script>
    
  </body>
