<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"/>
<title>Islamic Azkar Pro | درود شریف کاؤنٹر | سورۃ الکہف | Pakistan</title>
<meta name="description" content="مکمل اسلامی ایپ — درود شریف ۸۰ مرتبہ، فجر/مغرب اذکار، جمعہ وِرد، سورۃ الکہف، تسبیحِ فاطمہؓ — بغیر انٹرنیٹ کے چلتی ہے۔"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;700&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ===== RESET & ROOT ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#010c02;--surf:#071209;--gold:#d4a017;--gold2:#f0c840;
  --g1:#3cb371;--g2:#5cdb95;--text:#dff0df;--text2:#5e9a6e;--text3:#3a6045;
  --ar:#f0eadb;--bdr:rgba(60,179,113,.16);--bdr2:rgba(60,179,113,.07);--r:18px;
  --qs:1.52rem;
  --qfont:'Al Majeed','Scheherazade New','Noto Naskh Arabic',serif;
}
@font-face{font-family:'Hafs Uthmanic';src:url('fonts/hafs.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Al Qalam Quran';src:url('fonts/al-qalam.ttf') format('truetype');font-display:swap}
@font-face{font-family:'PDMS Saleem';src:url('fonts/pdms-saleem.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Muhammadi';src:url('fonts/muhammadi.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Al Mushaf';src:url('fonts/al-mushaf.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Al Majeed';src:url('fonts/al-majeed.ttf') format('truetype');font-display:swap}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);font-family:'Noto Nastaliq Urdu',serif;color:var(--text);display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 15% 12%,rgba(60,179,113,.06) 0%,transparent 52%),radial-gradient(ellipse at 85% 85%,rgba(60,179,113,.04) 0%,transparent 52%)}
/* ===== NAV ===== */
.nav{position:sticky;top:0;z-index:100;width:100%;max-width:540px;background:rgba(1,12,2,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:.44rem .5rem;display:flex;align-items:center;gap:.28rem}
.chips{display:flex;gap:.2rem;overflow-x:auto;flex:1;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:.28rem .5rem;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--text3);font-family:'Noto Nastaliq Urdu',serif;font-size:.68rem;cursor:pointer;transition:all .2s;line-height:1.5;white-space:nowrap}
.chip:hover{border-color:var(--g1);color:var(--g2)}
.chip.active{border-color:var(--g1);background:rgba(60,179,113,.14);color:var(--g2)}
.menu-btn{flex-shrink:0;background:rgba(60,179,113,.1);border:1px solid var(--bdr);color:var(--g1);width:33px;height:33px;border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.prog{width:100%;max-width:540px;height:2px;background:rgba(60,179,113,.06);position:sticky;top:46px;z-index:99;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(to left,var(--gold),var(--g1));transition:width .45s ease}
/* ===== ZOOM BAR ===== */
.zoom-bar{position:sticky;top:48px;z-index:98;width:100%;max-width:540px;display:flex;align-items:center;justify-content:space-between;padding:.3rem .75rem;background:rgba(1,12,2,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--bdr2);direction:ltr;flex-wrap:wrap;gap:.3rem}
.zgroup{display:flex;align-items:center;gap:.32rem;flex-wrap:wrap}
.zb{background:rgba(60,179,113,.1);border:1px solid var(--bdr);color:var(--g1);width:27px;height:27px;border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.zb:hover{background:rgba(60,179,113,.22)}
.zlbl{font-family:monospace;font-size:.68rem;color:var(--text3);min-width:36px;text-align:center}
.zreset,.script-toggle{background:transparent;border:1px solid var(--bdr2);color:var(--text3);border-radius:20px;padding:.15rem .52rem;font-size:.64rem;cursor:pointer;transition:all .18s;font-family:'Noto Nastaliq Urdu',serif}
.zreset:hover,.script-toggle:hover{border-color:var(--g1);color:var(--g2)}
.script-toggle.active{border-color:var(--gold);color:var(--gold2);background:rgba(212,160,23,.1)}
.font-select{background:rgba(60,179,113,.1);border:1px solid var(--bdr);color:var(--g2);border-radius:20px;padding:.2rem .5rem;font-size:.65rem;font-family:'Noto Nastaliq Urdu',serif;cursor:pointer;outline:none;max-width:120px}
.font-select option{background:#071209;color:var(--text)}
.taj-select{background:rgba(60,179,113,.08);border:1px solid var(--bdr);color:var(--g2);border-radius:20px;padding:.2rem .5rem;font-size:.62rem;font-family:'Noto Nastaliq Urdu',serif;cursor:pointer;outline:none;max-width:130px}
.taj-select option{background:#071209;color:var(--text)}
.taj-label{font-size:.62rem;color:var(--text3);white-space:nowrap}
.vmodes{display:none;gap:.22rem}
.vm{padding:.22rem .52rem;border-radius:20px;border:1px solid var(--bdr2);background:transparent;color:var(--text3);font-size:.65rem;font-family:'Noto Nastaliq Urdu',serif;cursor:pointer}
.vm.active{background:rgba(60,179,113,.14);border-color:var(--g1);color:var(--g2)}
/* ===== SCROLL BAR ===== */
.scroll-bar{position:sticky;top:83px;z-index:97;width:100%;max-width:540px;display:flex;align-items:center;gap:.5rem;padding:.32rem .75rem;background:rgba(1,12,2,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--bdr2);direction:ltr}
.sc-play{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:rgba(60,179,113,.15);border:1px solid rgba(60,179,113,.35);color:var(--g2);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sc-play.playing{background:rgba(212,160,23,.2);border-color:rgba(212,160,23,.4);color:var(--gold2)}
.sc-speed{display:flex;align-items:center;gap:.25rem}
.sb{width:22px;height:22px;border-radius:50%;background:rgba(60,179,113,.08);border:1px solid var(--bdr);color:var(--g1);font-size:.75rem;cursor:pointer}
.sc-lbl{font-size:.62rem;color:var(--text3);min-width:52px;text-align:center}
#scSlider{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:rgba(60,179,113,.15);border-radius:3px;outline:none;cursor:pointer}
#scSlider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--g1);cursor:pointer}
/* ===== MAIN CONTENT ===== */
#mc{position:relative;z-index:1;width:100%;max-width:540px;padding-bottom:2rem}
.sp{padding:.9rem .85rem 1rem;display:flex;flex-direction:column;align-items:center;gap:.8rem;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-badge{display:flex;align-items:center;gap:.38rem;font-family:'Noto Naskh Arabic',serif;font-size:.7rem;color:var(--text3);direction:ltr}
.sec-label{width:100%;border-radius:30px;padding:.26rem .9rem;font-size:.76rem;direction:rtl;text-align:center;border:1px solid var(--bdr);color:var(--text2);background:rgba(60,179,113,.05)}
.dua-card{width:100%;background:rgba(7,18,9,.82);border:1px solid var(--bdr);border-top:2px solid rgba(60,179,113,.22);border-radius:var(--r);padding:1.15rem 1.05rem 1rem;text-align:center}
.ar{font-family:var(--qfont);font-size:var(--qs);line-height:2.8;color:var(--ar);direction:rtl;word-break:break-word;text-align:justify;transition:font-size .2s ease}
.ar.big{font-size:calc(var(--qs)*1.3);text-align:center;color:var(--gold2)}
.bismi{font-family:var(--qfont);font-size:calc(var(--qs)*.92);color:var(--gold2);direction:rtl;display:block;margin-bottom:.32rem}
.dua-name{margin-top:.62rem;font-size:.8rem;color:var(--text2);direction:rtl;border-top:1px solid var(--bdr2);padding-top:.52rem;line-height:1.9}
.faz-btn{width:100%;background:transparent;border:1px solid rgba(60,179,113,.12);border-radius:30px;padding:.3rem .85rem;color:var(--text3);font-size:.73rem;cursor:pointer}
.faz-btn:hover{border-color:var(--g1);color:var(--g2)}
.faz-body{display:none;width:100%;background:rgba(60,179,113,.05);border:1px solid rgba(60,179,113,.13);border-right:3px solid var(--g1);border-radius:12px;padding:.65rem .9rem;font-size:.82rem;color:#b0d8b0;direction:rtl;line-height:2.15;text-align:right}
.faz-body.open{display:block}
.faz-ref{font-size:.68rem;color:var(--g2);display:block;margin-top:.25rem}
/* ===== RING ===== */
.ring-wrap{position:relative;width:168px;height:168px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.ring-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);pointer-events:none}
.rbg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:7}
.rfill{fill:none;stroke-width:7;stroke-linecap:round;stroke-dasharray:465;stroke-dashoffset:465;transition:stroke-dashoffset .3s cubic-bezier(.4,0,.2,1)}
.ring-inner{position:absolute;inset:12px;background:radial-gradient(circle at 38% 32%,#0d1e0f,var(--bg));border-radius:50%;border:1px solid rgba(60,179,113,.16);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap:active .ring-inner{transform:scale(.91)}
.rnum{font-family:'Noto Naskh Arabic',serif;font-size:2.85rem;font-weight:700;color:var(--gold2);line-height:1}
.rof{font-size:.72rem;color:var(--text2);margin-top:3px;direction:ltr}
@keyframes pg{0%{box-shadow:0 0 0 0 rgba(60,179,113,.38)}70%{box-shadow:0 0 0 15px rgba(60,179,113,0)}100%{box-shadow:0 0 0 0 rgba(60,179,113,0)}}
.ring-inner.pg{animation:pg .3s ease-out}
/* ===== CONTROLS ===== */
.ctrls{width:100%;display:flex;align-items:center;justify-content:space-between;gap:.45rem;direction:ltr}
.btn{background:rgba(60,179,113,.07);border:1px solid var(--bdr);color:var(--text2);border-radius:40px;padding:.44rem .85rem;font-size:.78rem;font-family:'Noto Naskh Arabic',serif;cursor:pointer;transition:all .17s}
.btn:hover{background:rgba(60,179,113,.14);color:var(--g2)}
.btn:active{transform:scale(.94)}
.btn.next{background:rgba(60,179,113,.14);border-color:rgba(60,179,113,.38);color:var(--g2);padding:.44rem 1.25rem}
.btn:disabled{opacity:.22;cursor:not-allowed;pointer-events:none}
.dam-box{width:100%;background:rgba(60,179,113,.07);border:1px solid rgba(60,179,113,.2);border-radius:14px;padding:.8rem .95rem;font-size:.86rem;color:#90f0b8;direction:rtl;line-height:2.15;text-align:right}
.urdu-note{width:100%;background:rgba(212,160,23,.055);border:1px solid rgba(212,160,23,.15);border-right:3px solid var(--gold);border-radius:12px;padding:.7rem .9rem;font-size:.83rem;color:#d4c490;direction:rtl;line-height:2.1;text-align:right}
.asr-img{width:100%;max-width:360px;border-radius:14px;border:1px solid rgba(240,200,66,.2);display:block;margin:0 auto}
/* ===== QURAN ===== */
.quran-panel{padding:.75rem .82rem 3.5rem;animation:fadeUp .25s ease}
.quran-hd{text-align:center;padding:1rem .9rem .9rem;border-bottom:1px solid var(--bdr);margin-bottom:.75rem}
.quran-title{font-family:var(--qfont);font-size:2rem;color:var(--gold2);direction:rtl;line-height:2.2;text-shadow:0 0 20px rgba(212,160,23,.28)}
.quran-meta{font-size:.78rem;color:var(--text2);direction:rtl;line-height:2;margin-top:.3rem}
.quran-bism{font-family:var(--qfont);font-size:calc(var(--qs)*1.18);line-height:2.6;color:var(--gold2);text-align:center;direction:rtl;padding:.7rem .5rem}
.ruku-sep{text-align:center;margin:1.2rem 0 .45rem;font-size:.72rem;color:var(--g1);letter-spacing:1.5px;direction:ltr;display:flex;align-items:center;justify-content:center;gap:9px}
.ruku-sep::before,.ruku-sep::after{content:'';display:block;width:35px;height:1px;background:linear-gradient(90deg,transparent,rgba(60,179,113,.28))}
.ruku-sep::after{background:linear-gradient(90deg,rgba(60,179,113,.28),transparent)}
.vblock{display:flex;align-items:baseline;flex-direction:row-reverse;gap:.5rem;padding:.52rem .35rem;border-bottom:1px solid rgba(255,255,255,.04);direction:rtl}
.vtxt{font-family:var(--qfont);font-size:var(--qs);line-height:2.8;color:var(--ar);direction:rtl;flex:1;word-break:break-word;transition:font-size .2s ease}
.vnum{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(60,179,113,.12);border:1px solid rgba(60,179,113,.25);display:flex;align-items:center;justify-content:center;font-size:.63rem;color:var(--g2);direction:ltr}
.para-block{font-family:var(--qfont);font-size:var(--qs);line-height:2.85;color:var(--ar);direction:rtl;text-align:justify;padding:.28rem .18rem;word-break:break-word}
.vnum-inline{font-size:.7rem;color:var(--g2);background:rgba(60,179,113,.1);border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;margin:0 .15rem;vertical-align:middle;direction:ltr}
/* ===== TAJWEED COLORS ===== */
.taj-classic .tw-qalaqah{color:#FF6B6B}
.taj-classic .tw-ghunnah{color:#3ECF6E}
.taj-classic .tw-idgham{color:#3ECF6E}
.taj-classic .tw-madda{color:#537FFF}
.taj-classic .tw-ikhfa{color:#C266FF}
.taj-classic .tw-iqlab{color:#26BFFD}
.taj-classic .tw-ikhfa-shafawi{color:#E066CC}
.taj-classic .tw-idgham-shafawi{color:#E066CC}
.taj-classic .tw-slnt{color:#9b9b9b}
.taj-taj4 .tw-qalaqah{color:#CC0000;font-weight:700}
.taj-taj4 .tw-ghunnah{color:#008000;font-weight:600}
.taj-taj4 .tw-idgham{color:#008000;font-weight:600}
.taj-taj4 .tw-madda{color:#0066CC;font-weight:600}
.taj-taj4 .tw-ikhfa{color:#888888}
.taj-taj4 .tw-iqlab{color:#888888}
.taj-taj4 .tw-ikhfa-shafawi{color:#888888}
.taj-taj4 .tw-idgham-shafawi{color:#888888}
.taj-taj4 .tw-slnt{color:#888888}
.taj-off .tw-qalaqah,
.taj-off .tw-ghunnah,
.taj-off .tw-idgham,
.taj-off .tw-madda,
.taj-off .tw-ikhfa,
.taj-off .tw-iqlab,
.taj-off .tw-ikhfa-shafawi,
.taj-off .tw-idgham-shafawi,
.taj-off .tw-slnt{color:var(--ar) !important;font-weight:400 !important}
.tj-legend{display:flex;flex-wrap:wrap;gap:.3rem;padding:.65rem .8rem;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);direction:rtl;margin:.6rem 0}
.tj-chip{display:flex;align-items:center;gap:.26rem;font-size:.62rem;color:rgba(255,255,255,.55);padding:.14rem .4rem;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.tj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* ===== TASBEEH ===== */
.tsb-phases{display:flex;gap:.35rem;width:100%;direction:ltr}
.ph-chip{flex:1;padding:.38rem .22rem;border-radius:16px;border:1px solid var(--bdr);background:transparent;color:var(--text3);font-size:.7rem;text-align:center;line-height:1.7;cursor:pointer}
/* ===== DRAWER ===== */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(5px)}
.overlay.open{display:block}
.drawer{position:fixed;top:0;right:-100%;width:min(300px,86vw);height:100vh;background:#071209;border-left:1px solid var(--bdr);z-index:201;display:flex;flex-direction:column;overflow-y:auto;transition:right .28s cubic-bezier(.4,0,.2,1);direction:rtl}
.drawer.open{right:0}
.dr-head{padding:1rem .9rem .8rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#071209;z-index:1}
.dr-title{font-size:.9rem;color:var(--gold2)}
.dr-close{background:rgba(60,179,113,.07);border:1px solid var(--bdr);color:var(--text2);width:26px;height:26px;border-radius:50%;font-size:.76rem;cursor:pointer}
.dr-body{padding:.6rem .8rem;flex:1}
.dr-item{display:flex;align-items:center;gap:.5rem;padding:.52rem .6rem;border-radius:10px;cursor:pointer;border:1px solid transparent;direction:rtl;margin-bottom:.12rem}
.dr-item:hover{background:rgba(60,179,113,.07);border-color:var(--bdr)}
.dr-item.active{background:rgba(60,179,113,.13);border-color:rgba(60,179,113,.28)}
.dr-name{font-size:.85rem;color:var(--text);flex:1;text-align:right;line-height:1.8}
.dr-ct{font-size:.65rem;background:rgba(60,179,113,.09);border-radius:20px;padding:1px 6px;white-space:nowrap;direction:ltr;color:var(--g1)}
.comp{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.96);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;gap:.85rem}
.comp.show{display:flex;animation:fadeUp .4s ease}
.comp-btn{background:rgba(60,179,113,.2);border:1px solid rgba(60,179,113,.4);color:var(--g2);border-radius:40px;padding:.62rem 1.7rem;font-size:.87rem;cursor:pointer}
@media(max-width:360px){:root{--qs:1.3rem}.ring-wrap{width:155px;height:155px}.rnum{font-size:2.5rem}}
</style>
</head>
<body>

<nav class="nav">
  <div class="chips" id="chips">
    <button class="chip active" data-sec="asr">☀️ عصر درود</button>
    <button class="chip" data-sec="fajr">🌅 فجر/مغرب</button>
    <button class="chip" data-sec="jumma">🌙 جمعہ</button>
    <button class="chip" data-sec="tauheed">☝️ توحید</button>
    <button class="chip" data-sec="kahf">📖 سورۃ الکہف</button>
    <button class="chip" data-sec="tasbeeh">📿 تسبیح</button>
  </div>
  <button class="menu-btn" id="menuBtn">☰</button>
</nav>
<div class="prog"><div class="prog-bar" id="progBar" style="width:0%"></div></div>

<div class="zoom-bar">
  <div class="zgroup">
    <button class="zb" id="zOut">−</button>
    <span class="zlbl" id="zlbl">100%</span>
    <button class="zb" id="zIn">+</button>
    <button class="zreset" id="zReset">Reset</button>
  </div>
  <div class="zgroup">
    <span>🖋️</span>
    <select id="fontPicker" class="font-select">
      <option value="hafs">حفص عثمانی</option>
      <option value="alqalam">القلم قرآن</option>
      <option value="pdms">پی ڈی ایم ایس</option>
      <option value="muhammadi">محمدی</option>
      <option value="almushaf">المصحف</option>
      <option value="almajeed" selected>المجید قرآنی</option>
      <option value="scheherazade">Scheherazade</option>
    </select>
  </div>
  <div class="zgroup">
    <span class="taj-label">🎨</span>
    <select id="tajSelect" class="taj-select">
      <option value="off">تجدید بند</option>
      <option value="classic" selected>تجدید کلاسک</option>
      <option value="taj4">تجدید 4-رنگ</option>
    </select>
  </div>
  <div class="zgroup">
    <button class="script-toggle" id="scriptToggle">📜 مدینہ</button>
  </div>
  <div class="vmodes" id="vmodes">
    <button class="vm active" data-vm="verse">آیت بہ آیت</button>
    <button class="vm" data-vm="para">پیراگراف</button>
  </div>
</div>

<div class="scroll-bar" id="scrollBar" style="display:none">
  <button class="sc-play" id="scPlay">▶</button>
  <div class="sc-speed">
    <button class="sb" id="scSlower">−</button>
    <span class="sc-lbl" id="scLbl">درمیانی</span>
    <button class="sb" id="scFaster">+</button>
  </div>
  <input type="range" id="scSlider" min="1" max="9" value="5" step="1"/>
</div>

<main id="mc"></main>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="dr-head">
    <div class="dr-title">🕌 تمام اذکار</div>
    <button class="dr-close" id="closeDrawer">✕</button>
  </div>

    {n:38,t:`لَّـٰكِنَّا۟ هُوَ ٱللَّهُ رَبِّى وَلَآ أُشْرِكُ بِرَبِّىٓ أَحَدًا`},
    {n:39,t:`وَلَوْلَآ إِذْ دَخَلْتَ جَنَّتَكَ قُلْتَ مَا شَآءَ ٱللَّهُ لَا قُوَّةَ إِلَّا بِٱللَّهِ‌ۚ إِن تَرَنِ أَنَا۟ أَقَلَّ مِنكَ مَالاً وَوَلَدًا`},
    {n:40,t:`فَعَسَىٰ رَبِّىٓ أَن يُؤْتِيَنِ خَيْرًا مِّن جَنَّتِكَ وَيُرْسِلَ عَلَيْهَا حُسْبَانًا مِّنَ ٱلسَّمَآءِ فَتُصْبِحَ صَعِيدًا زَلَقًا`},
    {n:41,t:`أَوْ يُصْبِحَ مَآؤُهَا غَوْرًا فَلَن تَسْتَطِيعَ لَهُۥ طَلَبًا`},
    {n:42,t:`وَأُحِيطَ بِثَمَرِهِۦ فَأَصْبَحَ يُقَلِّبُ كَفَّيْهِ عَلَىٰ مَآ أَنفَقَ فِيهَا وَهِىَ خَاوِيَةٌ عَلَىٰ عُرُوشِهَا وَيَقُولُ يَـٰلَيْتَنِى لَمْ أُشْرِكْ بِرَبِّىٓ أَحَدًا`},
    {n:43,t:`وَلَمْ تَكُن لَّهُۥ فِئَةٌ يَنصُرُونَهُۥ مِن دُونِ ٱللَّهِ وَمَا كَانَ مُنتَصِرًا`},
    {n:44,t:`هُنَالِكَ ٱلْوَلَـٰيَةُ لِلَّهِ ٱلْحَقِّ‌ۚ هُوَ خَيْرٌ ثَوَابًا وَخَيْرٌ عُقْبًا`}
  ]},
  {r:'رکوع ۶', verses:[
    {n:45,t:`وَٱضْرِبْ لَهُم مَّثَلَ ٱلْحَيَوٲةِ ٱلدُّنْيَا كَمَآءٍ أَنزَلْنَـٰهُ مِنَ ٱلسَّمَآءِ فَٱخْتَلَطَ بِهِۦ نَبَاتُ ٱلْأَرْضِ فَأَصْبَحَ هَشِيمًا تَذْرُوهُ ٱلرِّيَـٰحُ‌ۗ وَكَانَ ٱللَّهُ عَلَىٰ كُلِّ شَىْءٍ مُّقْتَدِرًا`},
    {n:46,t:`ٱلْمَالُ وَٱلْبَنُونَ زِينَةُ ٱلْحَيَوٲةِ ٱلدُّنْيَا‌ۖ وَٱلْبَـٰقِيَـٰتُ ٱلصَّـٰلِحَـٰتُ خَيْرٌ عِندَ رَبِّكَ ثَوَابًا وَخَيْرٌ أَمَلاً`},
    {n:47,t:`وَيَوْمَ نُسَيِّرُ ٱلْجِبَالَ وَتَرَى ٱلْأَرْضَ بَارِزَةً وَحَشَرْنَـٰهُمْ فَلَمْ نُغَادِرْ مِنْهُمْ أَحَدًا`},
    {n:48,t:`وَعُرِضُواْ عَلَىٰ رَبِّكَ صَفًّا لَّقَدْ جِئْتُمُونَا كَمَا خَلَقْنَـٰكُمْ أَوَّلَ مَرَّةِۭ‌ۚ بَلْ زَعَمْتُمْ أَلَّن نَّجْعَلَ لَكُم مَّوْعِدًا`},
    {n:49,t:`وَوُضِعَ ٱلْكِتَـٰبُ فَتَرَى ٱلْمُجْرِمِينَ مُشْفِقِينَ مِمَّا فِيهِ وَيَقُولُونَ يَـٰوَيْلَتَنَا مَالِ هَـٰذَا ٱلْكِتَـٰبِ لَا يُغَادِرُ صَغِيرَةً وَلَا كَبِيرَةً إِلَّآ أَحْصَـٰهَا‌ۚ وَوَجَدُواْ مَا عَمِلُواْ حَاضِرًا‌ۗ وَلَا يَظْلِمُ رَبُّكَ أَحَدًا`}
  ]},
  {r:'رکوع ۷', verses:[
    {n:50,t:`وَإِذْ قُلْنَا لِلْمَلَـٰٓئِكَةِ ٱسْجُدُواْ لِأَدَمَ فَسَجَدُوٓاْ إِلَّآ إِبْلِيسَ كَانَ مِنَ ٱلْجِنِّ فَفَسَقَ عَنْ أَمْرِ رَبِّهِۦٓ‌ۗ أَفَتَتَّخِذُونَهُۥ وَذُرِّيَّتَهُۥٓ أَوْلِيَآءَ مِن دُونِى وَهُمْ لَكُمْ عَدُوُّۢ‌ۚ بِئْسَ لِلظَّـٰلِمِينَ بَدَلاً`},
    {n:51,t:`۞ مَّآ أَشْهَدتُّهُمْ خَلْقَ ٱلسَّمَـٰوَٲتِ وَٱلْأَرْضِ وَلَا خَلْقَ أَنفُسِهِمْ وَمَا كُنتُ مُتَّخِذَ ٱلْمُضِلِّينَ عَضُدًا`},
    {n:52,t:`وَيَوْمَ يَقُولُ نَادُواْ شُرَكَآءِىَ ٱلَّذِينَ زَعَمْتُمْ فَدَعَوْهُمْ فَلَمْ يَسْتَجِيبُواْ لَهُمْ وَجَعَلْنَا بَيْنَهُم مَّوْبِقًا`},
    {n:53,t:`وَرَءَا ٱلْمُجْرِمُونَ ٱلنَّارَ فَظَنُّوٓاْ أَنَّهُم مُّوَاقِعُوهَا وَلَمْ يَجِدُواْ عَنْهَا مَصْرِفًا`}
  ]},
  {r:'رکوع ۸', verses:[
    {n:54,t:`وَلَقَدْ صَرَّفْنَا فِى هَـٰذَا ٱلْقُرْءَانِ لِلنَّاسِ مِن كُلِّ مَثَلٍ‌ۚ وَكَانَ ٱلْإِنسَـٰنُ أَكْثَرَ شَىْءٍ جَدَلاً`},
    {n:55,t:`وَمَا مَنَعَ ٱلنَّاسَ أَن يُؤْمِنُوٓاْ إِذْ جَآءَهُمُ ٱلْهُدَىٰ وَيَسْتَغْفِرُواْ رَبَّهُمْ إِلَّآ أَن تَأْتِيَهُمْ سُنَّةُ ٱلْأَوَّلِينَ أَوْ يَأْتِيَهُمُ ٱلْعَذَابُ قُبُلاً`},
    {n:56,t:`وَمَا نُرْسِلُ ٱلْمُرْسَلِينَ إِلَّا مُبَشِّرِينَ وَمُنذِرِينَ‌ۚ وَيُجَـٰدِلُ ٱلَّذِينَ كَفَرُواْ بِٱلْبَـٰطِلِ لِيُدْحِضُواْ بِهِ ٱلْحَقَّ‌ۖ وَٱتَّخَذُوٓاْ ءَايَـٰتِى وَمَآ أُنذِرُواْ هُزُوًا`},
    {n:57,t:`وَمَنْ أَظْلَمُ مِمَّن ذُكِّرَ بِـَٔـايَـٰتِ رَبِّهِۦ فَأَعْرَضَ عَنْهَا وَنَسِىَ مَا قَدَّمَتْ يَدَاهُ‌ۚ إِنَّا جَعَلْنَا عَلَىٰ قُلُوبِهِمْ أَكِنَّةً أَن يَفْقَهُوهُ وَفِىٓ ءَاذَانِهِمْ وَقْرًا‌ۖ وَإِن تَدْعُهُمْ إِلَى ٱلْهُدَىٰ فَلَن يَهْتَدُوٓاْ إِذًا أَبَدًا`},
    {n:58,t:`وَرَبُّكَ ٱلْغَفُورُ ذُو ٱلرَّحْمَةِ‌ۖ لَوْ يُؤَاخِذُهُم بِمَا كَسَبُواْ لَعَجَّلَ لَهُمُ ٱلْعَذَابَ‌ۚ بَل لَّهُم مَّوْعِدٌ لَّن يَجِدُواْ مِن دُونِهِۦ مَوْئِلاً`},
    {n:59,t:`وَتِلْكَ ٱلْقُرَىٰٓ أَهْلَكْنَـٰهُمْ لَمَّا ظَلَمُواْ وَجَعَلْنَا لِمَهْلِكِهِم مَّوْعِدًا`}
  ]},
  {r:'رکوع ۹', verses:[
    {n:60,t:`وَإِذْ قَالَ مُوسَىٰ لِفَتَـٰهُ لَآ أَبْرَحُ حَتَّىٰٓ أَبْلُغَ مَجْمَعَ ٱلْبَحْرَيْنِ أَوْ أَمْضِىَ حُقُبًا`},
    {n:61,t:`فَلَمَّا بَلَغَا مَجْمَعَ بَيْنِهِمَا نَسِيَا حُوتَهُمَا فَٱتَّخَذَ سَبِيلَهُۥ فِى ٱلْبَحْرِ سَرَبًا`},
    {n:62,t:`فَلَمَّا جَاوَزَا قَالَ لِفَتَـٰهُ ءَاتِنَا غَدَآءَنَا لَقَدْ لَقِينَا مِن سَفَرِنَا هَـٰذَا نَصَبًا`},
    {n:63,t:`قَالَ أَرَءَيْتَ إِذْ أَوَيْنَآ إِلَى ٱلصَّخْرَةِ فَإِنِّى نَسِيتُ ٱلْحُوتَ وَمَآ أَنْسَـٰنِيهُ إِلَّا ٱلشَّيْطَـٰنُ أَنْ أَذْكُرَهُۥ‌ۚ وَٱتَّخَذَ سَبِيلَهُۥ فِى ٱلْبَحْرِ عَجَبًا`},
    {n:64,t:`قَالَ ذَٲلِكَ مَا كُنَّا نَبْغِ‌ۚ فَٱرْتَدَّا عَلَىٰٓ ءَاثَارِهِمَا قَصَصًا`},
    {n:65,t:`فَوَجَدَا عَبْدًا مِّنْ عِبَادِنَآ ءَاتَيْنَـٰهُ رَحْمَةً مِّنْ عِندِنَا وَعَلَّمْنَـٰهُ مِن لَّدُنَّا عِلْمًا`},
    {n:66,t:`قَالَ لَهُۥ مُوسَىٰ هَلْ أَتَّبِعُكَ عَلَىٰٓ أَن تُعَلِّمَنِ مِمَّا عُلِّمْتَ رُشْدًا`},
    {n:67,t:`قَالَ إِنَّكَ لَن تَسْتَطِيعَ مَعِىَ صَبْرًا`},
    {n:68,t:`وَكَيْفَ تَصْبِرُ عَلَىٰ مَا لَمْ تُحِطْ بِهِۦ خُبْرًا`},
    {n:69,t:`قَالَ سَتَجِدُنِىٓ إِن شَآءَ ٱللَّهُ صَابِرًا وَلَآ أَعْصِى لَكَ أَمْرًا`},
    {n:70,t:`قَالَ فَإِنِ ٱتَّبَعْتَنِى فَلَا تَسْــَٔلْنِى عَن شَىْءٍ حَتَّىٰٓ أُحْدِثَ لَكَ مِنْهُ ذِكْرًا`}
  ]},
  {r:'رکوع ۱۰', verses:[
    {n:71,t:`فَٱنطَلَقَا حَتَّىٰٓ إِذَا رَكِبَا فِى ٱلسَّفِينَةِ خَرَقَهَا‌ۖ قَالَ أَخَرَقْتَهَا لِتُغْرِقَ أَهْلَهَا لَقَدْ جِئْتَ شَيْــًٔا إِمْرًا`},
    {n:72,t:`قَالَ أَلَمْ أَقُلْ إِنَّكَ لَن تَسْتَطِيعَ مَعِىَ صَبْرًا`},
    {n:73,t:`قَالَ لَا تُؤَاخِذْنِى بِمَا نَسِيتُ وَلَا تُرْهِقْنِى مِنْ أَمْرِى عُسْرًا`},
    {n:74,t:`فَٱنطَلَقَا حَتَّىٰٓ إِذَا لَقِيَا غُلَـٰمًا فَقَتَلَهُۥ قَالَ أَقَتَلْتَ نَفْسًا زَكِيَّةَۢ بِغَيْرِ نَفْسٍ لَّقَدْ جِئْتَ شَيْــًٔا نُّكْرًا`},
    {n:75,t:`۞ قَالَ أَلَمْ أَقُل لَّكَ إِنَّكَ لَن تَسْتَطِيعَ مَعِىَ صَبْرًا`},
    {n:76,t:`قَالَ إِن سَأَلْتُكَ عَن شَىْءِۭ بَعْدَهَا فَلَا تُصَـٰحِبْنِى‌ۖ قَدْ بَلَغْتَ مِن لَّدُنِّى عُذْرًا`},
    {n:77,t:`فَٱنطَلَقَا حَتَّىٰٓ إِذَآ أَتَيَآ أَهْلَ قَرْيَةٍ ٱسْتَطْعَمَآ أَهْلَهَا فَأَبَوْاْ أَن يُضَيِّفُوهُمَا فَوَجَدَا فِيهَا جِدَارًا يُرِيدُ أَن يَنقَضَّ فَأَقَامَهُۥ‌ۖ قَالَ لَوْ شِئْتَ لَتَّخَذْتَ عَلَيْهِ أَجْرًا`},
    {n:78,t:`قَالَ هَـٰذَا فِرَاقُ بَيْنِى وَبَيْنِكَ‌ۚ سَأُنَبِّئُكَ بِتَأْوِيلِ مَا لَمْ تَسْتَطِع عَّلَيْهِ صَبْرًا`},
    {n:79,t:`أَمَّا ٱلسَّفِينَةُ فَكَانَتْ لِمَسَـٰكِينَ يَعْمَلُونَ فِى ٱلْبَحْرِ فَأَرَدتُّ أَنْ أَعِيبَهَا وَكَانَ وَرَآءَهُم مَّلِكٌ يَأْخُذُ كُلَّ سَفِينَةٍ غَصْبًا`},
    {n:80,t:`وَأَمَّا ٱلْغُلَـٰمُ فَكَانَ أَبَوَاهُ مُؤْمِنَيْنِ فَخَشِينَآ أَن يُرْهِقَهُمَا طُغْيَـٰنًا وَكُفْرًا`},
    {n:81,t:`فَأَرَدْنَآ أَن يُبْدِلَهُمَا رَبُّهُمَا خَيْرًا مِّنْهُ زَكَوٲةً وَأَقْرَبَ رُحْمًا`},
    {n:82,t:`وَأَمَّا ٱلْجِدَارُ فَكَانَ لِغُلَـٰمَيْنِ يَتِيمَيْنِ فِى ٱلْمَدِينَةِ وَكَانَ تَحْتَهُۥ كَنزٌ لَّهُمَا وَكَانَ أَبُوهُمَا صَـٰلِحًا فَأَرَادَ رَبُّكَ أَن يَبْلُغَآ أَشُدَّهُمَا وَيَسْتَخْرِجَا كَنزَهُمَا رَحْمَةً مِّن رَّبِّكَ‌ۚ وَمَا فَعَلْتُهُۥ عَنْ أَمْرِى‌ۚ ذَٲلِكَ تَأْوِيلُ مَا لَمْ تَسْطِع عَّلَيْهِ صَبْرًا`}
  ]},
  {r:'رکوع ۱۱', verses:[
    {n:83,t:`وَيَسْــَٔلُونَكَ عَن ذِى ٱلْقَرْنَيْنِ‌ۖ قُلْ سَأَتْلُواْ عَلَيْكُم مِّنْهُ ذِكْرًا`},
    {n:84,t:`إِنَّا مَكَّنَّا لَهُۥ فِى ٱلْأَرْضِ وَءَاتَيْنَـٰهُ مِن كُلِّ شَىْءٍ سَبَبًا`},
    {n:85,t:`فَأَتْبَعَ سَبَبًا`},
    {n:86,t:`حَتَّىٰٓ إِذَا بَلَغَ مَغْرِبَ ٱلشَّمْسِ وَجَدَهَا تَغْرُبُ فِى عَيْنٍ حَمِئَةٍ وَوَجَدَ عِندَهَا قَوْمًا‌ۗ قُلْنَا يَـٰذَا ٱلْقَرْنَيْنِ إِمَّآ أَن تُعَذِّبَ وَإِمَّآ أَن تَتَّخِذَ فِيهِمْ حُسْنًا`},
    {n:87,t:`قَالَ أَمَّا مَن ظَلَمَ فَسَوْفَ نُعَذِّبُهُۥ ثُمَّ يُرَدُّ إِلَىٰ رَبِّهِۦ فَيُعَذِّبُهُۥ عَذَابًا نُّكْرًا`},
    {n:88,t:`وَأَمَّا مَنْ ءَامَنَ وَعَمِلَ صَـٰلِحًا فَلَهُۥ جَزَآءً ٱلْحُسْنَىٰ‌ۖ وَسَنَقُولُ لَهُۥ مِنْ أَمْرِنَا يُسْرًا`},
    {n:89,t:`ثُمَّ أَتْبَعَ سَبَبًا`},
    {n:90,t:`حَتَّىٰٓ إِذَا بَلَغَ مَطْلِعَ ٱلشَّمْسِ وَجَدَهَا تَطْلُعُ عَلَىٰ قَوْمٍ لَّمْ نَجْعَل لَّهُم مِّن دُونِهَا سِتْرًا`},

// ─── 2. HELPERS ───

// Convert Uthmani to IndoPak (simple replacement for common patterns)
function convertToIndoPak(text) {
  let t = text;
  t = t.replace(/لَّهُ/g, 'لَّہُ');
  t = t.replace(/لَّهٗ/g, 'لَّہٗ');
  t = t.replace(/لّٰهُ/g, 'لّٰہُ');
  t = t.replace(/لّٰهٗ/g, 'لّٰہٗ');
  t = t.replace(/ عَلَیْهِ /g, ' عَلَیْہِ ');
  t = t.replace(/ عَلَیْهِ/g, ' عَلَیْہِ');
  t = t.replace(/ عَنْهُ/g, ' عَنْہُ');
  t = t.replace(/ لَدُنْهُ/g, ' لَدُنْہُ');
  t = t.replace(/ مِنْهُ/g, ' مِنْہُ');
  t = t.replace(/ لَهُ/g, ' لَہُ');
  t = t.replace(/ بِهٖ/g, ' بِہٖ');
  t = t.replace(/ لَهٗ/g, ' لَہٗ');
  t = t.replace(/ىٓ/g, 'یٓ');
  t = t.replace(/عَلَى/g, 'عَلَی');
  t = t.replace(/إِلَى/g, 'إِلَی');
  t = t.replace(/فِى/g, 'فِی');
  return t;
}

// ─── 3. TAJWEED ENGINE ───
const TAJWEED_RULES = [
  {pattern: /([قطبدج]ْ)/g, cls: 'tw-qalaqah'},
  {pattern: /([قطبدج]ّ)/g, cls: 'tw-qalaqah'},
  {pattern: /([نّم]ّ)/g, cls: 'tw-ghunnah'},
  {pattern: /(ً|ٍ|ٌ)/g, cls: 'tw-ghunnah'},
  {pattern: /(ا|و|ي)ْ/g, cls: 'tw-madda'},
  {pattern: /(آ)/g, cls: 'tw-madda'},
  {pattern: /(نْ)/g, cls: 'tw-ikhfa'},
  {pattern: /(نْب)/g, cls: 'tw-iqlab'},
  {pattern: /(نّ)/g, cls: 'tw-idgham'},
  {pattern: /(ٱ)/g, cls: 'tw-slnt'},
];

function applyTajweed(text) {
  if (!text || S.tajMode === 'off') return text;
  let result = text;
  TAJWEED_RULES.forEach(rule => {
    result = result.replace(rule.pattern, `<span class="${rule.cls}">$1</span>`);
  });
  return result;
}

function getAyatWithTajweed(ayah) {
  let text = ayah.t;
  if (S.scriptMode === 'indopak') text = convertToIndoPak(text);
  if (S.tajMode !== 'off') text = applyTajweed(text);
  return text;
}

// ─── 8. AUTO SCROLL ───
let scPlaying=false, scRAF=null, scLastTs=0, scSpeed=5;
const SPEED_PX = {1:8,2:14,3:20,4:27,5:35,6:45,7:58,8:75,9:95};
const SPEED_LBL = {1:'بہت آہستہ',2:'آہستہ',3:'قدرے آہستہ',4:'درمیانی',5:'درمیانی',6:'قدرے تیز',7:'تیز',8:'تیز',9:'بہت تیز'};
try{ const sp=JSON.parse(localStorage.getItem('azk_scroll_speed')||'5'); if(sp>=1&&sp<=9) scSpeed=sp; }catch(e){}
function updateScrollUI(){ document.getElementById('scLbl').textContent = SPEED_LBL[scSpeed]; document.getElementById('scSlider').value = scSpeed; document.getElementById('scPlay').classList.toggle('playing',scPlaying); document.getElementById('scPlay').textContent = scPlaying?'❚❚':'▶'; }
function scrollStep(ts){ if(!scPlaying) return; if(!scLastTs) scLastTs=ts; const dt=(ts-scLastTs)/1000; scLastTs=ts; window.scrollBy(0, SPEED_PX[scSpeed]*dt); if((window.innerHeight+window.scrollY)>=(document.body.scrollHeight-6)) { stopAutoScroll(); return; } scRAF = requestAnimationFrame(scrollStep); }
function startAutoScroll(){ if(scPlaying) return; scPlaying=true; scLastTs=0; updateScrollUI(); scRAF=requestAnimationFrame(scrollStep); }
function stopAutoScroll(){ scPlaying=false; if(scRAF) cancelAnimationFrame(scRAF); scRAF=null; updateScrollUI(); }
function toggleAutoScroll(){ scPlaying ? stopAutoScroll() : startAutoScroll(); }
function setScrollSpeed(v){ scSpeed = Math.max(1, Math.min(9, v)); localStorage.setItem('azk_scroll_speed', JSON.stringify(scSpeed)); updateScrollUI(); }
document.getElementById('scPlay').addEventListener('click', toggleAutoScroll);
document.getElementById('scSlower').addEventListener('click', ()=>setScrollSpeed(scSpeed-1));
document.getElementById('scFaster').addEventListener('click', ()=>setScrollSpeed(scSpeed+1));
document.getElementById('scSlider').addEventListener('input', e=>setScrollSpeed(parseInt(e.target.value,10)));
window.addEventListener('wheel', e=>{ if(scPlaying && !e.target.closest('.scroll-bar')) stopAutoScroll(); }, {passive:true});
window.addEventListener('touchmove', e=>{ if(scPlaying && !e.target.closest('.scroll-bar')) stopAutoScroll(); }, {passive:true});
updateScrollUI();

let ac;

const vib = p => { try{ navigator.vibrate && navigator.vibrate(p); } catch(e){} };

// ─── 10. HELPERS ───
function toggleFaz(b){ const x = b.nextElementSibling; x.classList.toggle('open'); b.textContent = x.classList.contains('open') ? '▲ فضیلت چھپائیں' : '✨ فضیلت دیکھیں'; }
function ring(cnt,target,color,done){ const off = CIRC*(1-Math.min(cnt/target,1)); return `<div class="ring-wrap" id="rw"><svg viewBox="0 0 172 172"><circle class="rbg" cx="86" cy="86" r="74"/><circle class="rfill" id="rf" cx="86" cy="86" r="74" style="stroke:${color};stroke-dashoffset:${done?0:off}"/></svg><div class="ring-inner" id="ri" style="border-color:${color}22">${done?`<div style="font-size:1.55rem">✅</div><div class="rof">مکمل</div>`:`<div class="rnum" id="rn" style="color:${color}">${cnt}</div><div class="rof">از ${target}</div><div class="rhint">tap to count</div>`}</div></div>`; }

// ─── 11. RENDER FUNCTIONS ───
function render() {
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.sec === sec));
  document.getElementById('vmodes').style.display = sec === 'kahf' ? 'flex' : 'none';
  document.getElementById('scrollBar').style.display = sec === 'kahf' ? 'flex' : 'none';
  if(sec !== 'kahf') stopAutoScroll();
  const mc = document.getElementById('mc');
  if(sec === 'kahf') { renderKahf(mc); return; }
  if(sec === 'asr') { renderAsr(mc); return; }
  if(sec === 'tasbeeh') { renderTasbeeh(mc); return; }
  const DATA = {fajr:FAJR, jumma:JUMMA, tauheed:TAUHEED};
  const steps = DATA[sec], st = S[sec], step = steps[st.idx];
  const total = steps.length, cnt = st.cnt, done = cnt >= step.target;
  const color = sec === 'jumma' ? '#a855f7' : 'var(--g1)';
  document.getElementById('progBar').style.width = ((st.idx + (done ? 1 : cnt/step.target)) / total * 100) + '%';
  const grp = (sec === 'fajr' && step.grp) ? `<div class="sec-label">📌 ${step.grp}</div>` : '';
  let h = `<div class="sp"><div class="step-badge"><div class="sdot" style="background:${color}"></div><span>${st.idx+1} / ${total}</span><div class="sdot" style="background:${color}"></div></div>${grp}`;
  if(step.isDm) {
    h += `<div class="dam-box"><strong>🫁 دَم کریں</strong><br/><br/>ہاتھوں پر تین بار پھونکیں — پھر پورے جسم پر ملیں۔</div>
    <div style="margin:.45rem 0"><div id="dmBtn" style="width:112px;height:112px;margin:0 auto;border-radius:50%;background:radial-gradient(circle at 38% 32%,#0d1e0f,var(--bg));border:1px solid rgba(60,179,113,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;">${done?'<div style="font-size:1.9rem">✅</div><div style="font-size:.68rem;color:var(--g2);margin-top:3px">مکمل</div>':'<div style="font-size:2rem">🫁</div><div style="font-size:.65rem;color:var(--text2);margin-top:3px">تسلیم</div>'}</div></div><div class="faz-body open" style="display:block">${step.faz}</div>`;
  } else {
    let txt = step.ar;
    if (S.scriptMode === 'indopak') txt = convertToIndoPak(txt);
    const hasBismi = txt.startsWith('بِسْمِ اللّٰهِ');
    let bismi = '', body = txt;
    if(hasBismi){ const nl = txt.indexOf('\n'); if(nl>-1){ bismi = txt.slice(0,nl); body = txt.slice(nl+1); } else { bismi = txt; body = ''; } }
    h += `<div class="dua-card">${bismi?`<span class="bismi">${bismi}</span>`:''}<div class="ar">${body.replace(/\n/g,'<br/><br/>')}</div><div class="dua-name">${step.name}</div></div>
    <button class="faz-btn" onclick="toggleFaz(this)">✨ فضیلت دیکھیں</button>
    <div class="faz-body">${step.faz}${step.ref?`<span class="faz-ref">${step.ref}</span>`:''}</div>${ring(cnt,step.target,color,done)}`;
  }
  const isLast = st.idx === total-1;
  h += `<div class="ctrls"><button class="btn" id="prevB" ${st.idx===0?'disabled':''}>← پچھلا</button><button class="btn" id="undoB">↩</button><button class="btn next" id="nextB">${done?(isLast?'🌿 ختم':'اگلا →'):'آگے →'}</button></div></div>`;
  mc.innerHTML = h;
  document.getElementById('rw')?.addEventListener('click', tap);
  document.getElementById('dmBtn')?.addEventListener('click', ()=>{ if(!done){ S[sec].done[S[sec].idx] = true; save(); render(); } });
  document.getElementById('prevB')?.addEventListener('click', ()=>{ if(S[sec].idx>0){ S[sec].idx--; S[sec].cnt=0; save(); render(); } });
  document.getElementById('undoB')?.addEventListener('click', doUndo);
  document.getElementById('nextB')?.addEventListener('click', goNext);
  renderDrawer();
}

function renderAsr(mc) {
  const cnt = S.asr.cnt, done = S.asr.done, off = CIRC*(1-Math.min(cnt/80,1));
  document.getElementById('progBar').style.width = (Math.min(cnt/80,1)*100)+'%';
  let txt = ASR_TEXT;
  if (S.scriptMode === 'indopak') txt = convertToIndoPak(txt);
  mc.innerHTML = `<div class="sp">
    <div class="step-badge"><div class="sdot" style="background:#f0c840"></div><span>☀️ جمعہ — نمازِ عصر کے بعد — ۸۰ مرتبہ</span><div class="sdot" style="background:#f0c840"></div></div>
    <div class="urdu-note">جمعہ کے دن نمازِ عصر کے بعد جگہ سے اٹھنے سے پہلے ۸۰ مرتبہ پڑھیں —<br/><strong>۸۰ سال کے گناہ معاف، ۸۰ سال کا ثواب</strong></div>
    <img class="asr-img" src="${ASR_IMG}" alt="درود شریف" loading="lazy" onerror="this.style.display='none';document.getElementById('asrFb').style.display='block'"/>
    <div id="asrFb" class="dua-card" style="display:none"><div class="ar big">${txt}</div><div class="dua-name">درودِ نبی اُمّی ﷺ — ۸۰ مرتبہ</div></div>
    <div class="ring-wrap" id="rw"><svg viewBox="0 0 172 172"><circle class="rbg" cx="86" cy="86" r="74"/><circle class="rfill" id="rf" cx="86" cy="86" r="74" style="stroke:#f0c840;stroke-dashoffset:${done?0:off}"/></svg>
      <div class="ring-inner" id="ri" style="border-color:rgba(240,200,64,.2)">${done?`<div style="font-size:1.55rem">✅</div><div class="rof" style="color:#f0c840">مکمل!</div>`:`<div class="rnum" id="rn" style="color:#f0c840">${cnt}</div><div class="rof">از ۸۰</div><div class="rhint">tap to count</div>`}</div></div>
    <div class="ctrls"><button class="btn" id="undoB">↩ واپس</button><button class="btn next" style="border-color:rgba(240,200,64,.38);color:#f0c840" id="asrReset">↺ دوبارہ</button></div>
  </div>`;
  document.getElementById('rw').addEventListener('click', tap);
  document.getElementById('undoB').addEventListener('click', doUndo);
  document.getElementById('asrReset').addEventListener('click', ()=>{ S.asr={cnt:0,done:false}; save(); renderAsr(mc); });
  renderDrawer();
}

function renderTasbeeh(mc) {
  const {ph,cnt,sets} = S.tasbeeh, phase = TSB[ph], target = phase.target, done = cnt >= target;
  const off = CIRC*(1-Math.min(cnt/target,1));
  document.getElementById('progBar').style.width = ((ph + (done?1:cnt/target))/3 * 100) + '%';
  let txt = phase.ar;
  if (S.scriptMode === 'indopak') txt = convertToIndoPak(txt);
  const chips = TSB.map((p,i) => `<div class="ph-chip" onclick="if(${i}!==${ph}){S.tasbeeh={ph:${i},cnt:0,sets:0};save();renderTasbeeh(document.getElementById('mc'));}" style="${i===ph?`border-color:${p.color};color:${p.color};background:${p.color}18`:i<ph?'border-color:var(--g1);color:var(--g1);background:rgba(60,179,113,.12)':''}"><div style="font-family:var(--qfont);font-size:.95rem">${p.ar}</div><div style="font-size:.6rem;margin-top:2px">${p.label} ×${p.target}</div>${i<ph?'<div>✓</div>':''}</div>`).join('');
  mc.innerHTML = `<div class="sp">
    <div class="step-badge"><div class="sdot" style="background:${phase.color}"></div><span>📿 تسبیحِ فاطمہؓ — مرحلہ ${ph+1}/3 — سیٹ ${sets+1}</span><div class="sdot" style="background:${phase.color}"></div></div>
    <div class="tsb-phases">${chips}</div>
    <div class="dua-card" style="border-top-color:${phase.color}45"><div class="ar xl" style="color:#f8f2e4">${txt}</div><div class="dua-name" style="color:${phase.color}">${phase.label} — × ${target}</div></div>
    <div class="faz-body open" style="display:block">روایت میں یہ مفہوم بیان ہوا ہے... <span class="faz-ref">(صحیح بخاری و مسلم)</span></div>
    <div class="ring-wrap" id="rw"><svg viewBox="0 0 172 172"><circle class="rbg" cx="86" cy="86" r="74"/><circle class="rfill" id="rf" cx="86" cy="86" r="74" style="stroke:${phase.color};stroke-dashoffset:${done?0:off}"/></svg>
      <div class="ring-inner" id="ri" style="border-color:${phase.color}28">${done?`<div style="font-size:1.55rem">✅</div><div class="rof">مکمل</div>`:`<div class="rnum" id="rn" style="color:${phase.color}">${cnt}</div><div class="rof">از ${target}</div><div class="rhint">tap to count</div>`}</div></div>
    <div class="ctrls"><button class="btn" id="undoB">↩</button><button class="btn next" id="nextB" style="border-color:${phase.color}55;color:${phase.color}">${done?(ph===2?'🌿 ختم':'اگلا ←'):'آگے →'}</button></div>
  </div>`;
  document.getElementById('rw').addEventListener('click', tap);
  document.getElementById('undoB').addEventListener('click', doUndo);
  document.getElementById('nextB').addEventListener('click', ()=>{
    if(!done) return;
    if(ph<2){ S.tasbeeh.ph++; S.tasbeeh.cnt=0; save(); renderTasbeeh(mc); }
    else { document.getElementById('compMsg').textContent = 'ماشاءاللہ! تسبیحِ فاطمہؓ مکمل ہوگئی 📿'; document.getElementById('compScreen').classList.add('show'); }
  });
  renderDrawer();
}

function renderKahf(mc) {
  document.getElementById('progBar').style.width = '100%';
  let h = `<div class="quran-panel"><div class="quran-hd"><div class="quran-title">سُورَةُ الْكَهْفِ</div><div class="quran-meta">مکمل سورۃ — ۱۱۰ آیات — ۱۲ رکوع<br/>ہر جمعہ تلاوت سنت ہے • مکمل آف لائن</div></div><div class="quran-bism">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
  KAHF_DATA.forEach(ruku => {
    h += `<div class="ruku-sep">${ruku.r}</div>`;
    if(viewMode === 'para') {
      h += `<div class="para-block">${ruku.verses.map(v => `${getAyatWithTajweed(v)} <span class="vnum-inline">${v.n}</span>`).join(' ')}</div>`;
    } else {
      h += ruku.verses.map(v => `<div class="vblock"><div class="vnum">${v.n}</div><div class="vtxt">${getAyatWithTajweed(v)}</div></div>`).join('');
    }
  });
  if(S.tajMode !== 'off') {
    const isTaj4 = S.tajMode === 'taj4';
    h += `<div class="tj-legend">
      <div class="tj-chip"><div class="tj-dot" style="background:${isTaj4?'#CC0000':'#FF6B6B'}"></div>قلقلہ</div>
      <div class="tj-chip"><div class="tj-dot" style="background:${isTaj4?'#008000':'#3ECF6E'}"></div>غنہ / ادغام</div>
      <div class="tj-chip"><div class="tj-dot" style="background:${isTaj4?'#0066CC':'#537FFF'}"></div>مد</div>
      <div class="tj-chip"><div class="tj-dot" style="background:${isTaj4?'#888888':'#C266FF'}"></div>اخفاء / اقلاب</div>
      ${!isTaj4?`<div class="tj-chip"><div class="tj-dot" style="background:#9b9b9b"></div>ساکن / وصل</div>`:''}
    </div>`;
  }
  h += `</div>`;
  mc.innerHTML = h;
  renderDrawer();
}

// ─── 12. TAP, UNDO, NEXT ───
function tap() {
  const isTsb = sec === 'tasbeeh', isAsr = sec === 'asr';
  let cnt, target;
  if(isAsr){ if(S.asr.done) return; cnt = S.asr.cnt; target = 80; }
  else if(isTsb){ const t = TSB[S.tasbeeh.ph]; if(S.tasbeeh.cnt >= t.target) return; cnt = S.tasbeeh.cnt; target = t.target; }
  else { const st = S[sec], d = {fajr:FAJR, jumma:JUMMA, tauheed:TAUHEED}[sec][st.idx]; if(st.cnt >= d.target) return; cnt = st.cnt; target = d.target; }
  if(cnt >= target) return;
  if(isAsr) S.asr.cnt++;
  else if(isTsb) S.tasbeeh.cnt++;
  else S[sec].cnt++;
  save();
  beep(isTsb?640:isAsr?800:760,.08);
  vib(18);
  const ri = document.getElementById('ri');
  if(ri){ ri.classList.remove('pg'); void ri.offsetWidth; ri.classList.add('pg'); }
  const nc = isAsr ? S.asr.cnt : isTsb ? S.tasbeeh.cnt : S[sec].cnt;
  const rn = document.getElementById('rn'); if(rn) rn.textContent = nc;
  const rf = document.getElementById('rf'); if(rf) rf.style.strokeDashoffset = CIRC*(1-nc/target);
  if(nc >= target) {
    beep(isTsb?500:560,.3,.2);
    vib([35,25,60]);
    if(isAsr) S.asr.done = true;
    else if(!isTsb) S[sec].done[S[sec].idx] = true;
    save();
    setTimeout(() => {
      if(isTsb){ const {ph} = S.tasbeeh; if(ph<2){ S.tasbeeh.ph++; S.tasbeeh.cnt=0; save(); renderTasbeeh(document.getElementById('mc')); } else { document.getElementById('compMsg').textContent = 'ماشاءاللہ! تسبیحِ فاطمہؓ مکمل ہوگئی 📿'; document.getElementById('compScreen').classList.add('show'); } return; }
      if(isAsr){ render(); return; }
      const st = S[sec]; const DATA = {fajr:FAJR, jumma:JUMMA, tauheed:TAUHEED};
      if(st.idx < DATA[sec].length-1){ st.idx++; st.cnt=0; save(); render(); window.scrollTo(0,0); }
      else { document.getElementById('compMsg').textContent = {fajr:'ماشاءاللہ! فجر/مغرب کے اذکار مکمل 🌅', jumma:'ماشاءاللہ! جمعہ کا مکمل وِرد ادا ہوگیا 🌙', tauheed:'ماشاءاللہ! ذکرِ توحید مکمل ہوگیا ☝️'}[sec]; document.getElementById('compScreen').classList.add('show'); }
    }, 750);
  }
}

function doUndo() {
  if(sec === 'asr'){ if(S.asr.cnt>0){ S.asr.cnt--; S.asr.done=false; save(); renderAsr(document.getElementById('mc')); } }
  else if(sec === 'tasbeeh'){ if(S.tasbeeh.cnt>0){ S.tasbeeh.cnt--; save(); renderTasbeeh(document.getElementById('mc')); } }
  else { const st = S[sec]; if(st.cnt>0){ st.cnt--; st.done[st.idx]=false; save(); render(); } }
}

function goNext() {
  const DATA = {fajr:FAJR, jumma:JUMMA, tauheed:TAUHEED}, st = S[sec];
  if(st.idx === DATA[sec].length-1){ document.getElementById('compMsg').textContent = {fajr:'ماشاءاللہ! فجر/مغرب کے اذکار مکمل 🌅', jumma:'ماشاءاللہ! جمعہ کا مکمل وِرد ادا ہوگیا 🌙', tauheed:'ماشاءاللہ! ذکرِ توحید مکمل ہوگیا ☝️'}[sec]; document.getElementById('compScreen').classList.add('show'); }
  else { st.idx++; st.cnt=0; save(); render(); window.scrollTo(0,0); }
}

// ─── 13. DRAWER ───
const SECS = [
  {id:'asr', icon:'☀️', title:'جمعہ عصر درود ×۸۰', ct:'×80'},
  {id:'fajr', icon:'🌅', title:'فجر/مغرب اذکار', ct:FAJR.length+' اذکار'},
  {id:'jumma', icon:'🌙', title:'جمعہ کا وِرد', ct:JUMMA.length+' اذکار'},
  {id:'tauheed', icon:'☝️', title:'توحید کے اذکار', ct:TAUHEED.length+' اذکار'},
  {id:'kahf', icon:'📖', title:'سورۃ الکہف', ct:'۱۱۰ آیات'},
  {id:'tasbeeh', icon:'📿', title:'تسبیحِ فاطمہؓ', ct:'۳۳+۳۳+۳۴'}
];
function renderDrawer() {
  const list = document.getElementById('drList'); if(!list) return;
  list.innerHTML = SECS.map(m => {
    let prog = '';
    if(['fajr','jumma','tauheed'].includes(m.id) && S[m.id]?.done){ const d = S[m.id].done.filter(Boolean).length; const tot = {fajr:FAJR.length, jumma:JUMMA.length, tauheed:TAUHEED.length}[m.id]; if(d>0) prog = `<span style="color:var(--g2);font-size:.65rem">${d}/${tot}</span>`; }
    if(m.id === 'asr' && S.asr.done) prog = `<span style="color:var(--g2);font-size:.7rem">✓</span>`;
    return `<div class="dr-item${sec===m.id?' active':''}" data-sec="${m.id}"><span class="dr-icon">${m.icon}</span><span class="dr-name">${m.title}</span><span class="dr-ct">${m.ct}</span>${prog}</div>`;
  }).join('');
  list.querySelectorAll('.dr-item').forEach(el => el.addEventListener('click', ()=>{ sec = el.dataset.sec; save(); closeDrawer(); render(); window.scrollTo(0,0); }));
}

// ─── 14. EVENTS ───
document.getElementById('menuBtn').addEventListener('click', ()=>{ document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); renderDrawer(); });
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', closeDrawer);
document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
document.getElementById('chips').addEventListener('click', e => { const c = e.target.closest('.chip'); if(!c) return; sec = c.dataset.sec; save(); render(); window.scrollTo(0,0); });
document.getElementById('restartBtn').addEventListener('click', ()=>{
  if(sec === 'asr') S.asr = {cnt:0,done:false};
  if(sec === 'fajr') S.fajr = {idx:0,cnt:0,done:new Array(FAJR.length).fill(false)};
  if(sec === 'jumma') S.jumma = {idx:0,cnt:0,done:new Array(JUMMA.length).fill(false)};
  if(sec === 'tauheed') S.tauheed = {idx:0,cnt:0,done:new Array(TAUHEED.length).fill(false)};
  if(sec === 'tasbeeh') S.tasbeeh = {ph:0,cnt:0,sets:0};
  save();
  document.getElementById('compScreen').classList.remove('show');
  render();
});
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if(e.code === 'Space' || e.code === 'Enter'){ e.preventDefault(); tap(); }
  if(e.code === 'Backspace') doUndo();
  if(e.code === 'ArrowRight') document.getElementById('nextB')?.click();
  if(e.code === 'ArrowLeft') document.getElementById('prevB')?.click();
  if(e.code === 'Equal' || e.code === 'NumpadAdd') applyZoom(zoomPct+10);
  if(e.code === 'Minus' || e.code === 'NumpadSubtract') applyZoom(zoomPct-10);
});
if('serviceWorker' in navigator){ window.addEventListener('load', ()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }
render();
</script>
</body>
