<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>اذکار و دعائیں</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tajweed.css"/>
<style>
:root{
  --bg:#030b04;--surf:#081509;--surf2:#0d200f;
  --gold:#d4a017;--gold2:#f0c842;
  --g1:#3cb371;--g2:#5cdb95;--g3:#a8f0c0;
  --text:#dff0df;--arabic:#f8f0e0;--text2:#6ea06e;
  --bdr:rgba(60,179,113,0.16);
  --r-namaz:#3cb371;--r-fajr:#f59e0b;--r-jumma:#a855f7;
  --r-asr:#f0c842;--r-tauheed:#22d3ee;--r-tasbeeh:#ec4899;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;background:var(--bg);
  font-family:'Noto Nastaliq Urdu','Amiri',serif;
  color:var(--text);display:flex;flex-direction:column;
  align-items:center;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(60,179,113,.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 90%,rgba(60,179,113,.04) 0%,transparent 60%);
}

/* ── SECTION CHIPS ── */
.chips-wrap{
  position:sticky;top:0;z-index:100;
  width:100%;max-width:480px;
  background:rgba(3,11,4,.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bdr);
  padding:.5rem .6rem .5rem;
  display:flex;align-items:center;gap:.35rem;
}
.chips-row{
  display:flex;gap:.3rem;overflow-x:auto;flex:1;
  scrollbar-width:none;padding-bottom:1px;
}
.chips-row::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;
  padding:.32rem .6rem;border-radius:20px;
  border:1px solid var(--bdr);background:transparent;
  color:var(--text2);font-family:'Noto Nastaliq Urdu',serif;
  font-size:.72rem;cursor:pointer;transition:all .22s;
  line-height:1.4;white-space:nowrap;
}
.chip.active{border-color:var(--g1);background:rgba(60,179,113,.15);color:var(--g2)}
.menu-btn{
  flex-shrink:0;background:rgba(60,179,113,.1);
  border:1px solid var(--bdr);color:var(--g1);
  width:34px;height:34px;border-radius:50%;
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.menu-btn:hover{background:rgba(60,179,113,.2)}

/* progress */
.prog-wrap{width:100%;max-width:480px;height:2px;background:rgba(60,179,113,.08);position:sticky;top:49px;z-index:99}
.prog-fill{height:100%;background:linear-gradient(to left,var(--gold),var(--g1));transition:width .4s}

/* ── STEP PANEL ── */
.step-panel{
  position:relative;z-index:1;width:100%;max-width:480px;
  padding:1rem .9rem 1rem;
  display:flex;flex-direction:column;align-items:center;gap:.8rem;
  animation:fadeUp .28s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

.sec-badge{
  display:flex;align-items:center;gap:.45rem;
  font-family:'Amiri',serif;font-size:.72rem;
  color:var(--text2);letter-spacing:.5px;direction:ltr;
}
.sec-dot{width:6px;height:6px;border-radius:50%;background:var(--g1)}

.info-strip{
  width:100%;border-radius:24px;
  padding:.3rem 1rem;font-size:.78rem;
  direction:rtl;display:flex;align-items:center;gap:.4rem;
  justify-content:center;
}

/* dua card */
.dua-card{
  width:100%;background:rgba(8,21,9,.7);
  border:1px solid var(--bdr);border-radius:18px;
  padding:1.1rem 1.1rem .9rem;text-align:center;
  backdrop-filter:blur(6px);
}
.arabic{
  font-family:'Amiri',serif;font-size:1.38rem;
  line-height:2.5;color:var(--arabic);
  direction:rtl;word-break:break-word;
}
.arabic.xl{font-size:1.7rem;line-height:2.7}
.dua-name{
  margin-top:.6rem;
  font-family:'Noto Nastaliq Urdu',serif;
  font-size:.83rem;color:var(--text2);direction:rtl;
}

/* fazilat toggle */
.faz-toggle{
  width:100%;background:transparent;
  border:1px solid rgba(60,179,113,.12);
  border-radius:30px;padding:.35rem .9rem;
  color:var(--text2);font-family:'Noto Nastaliq Urdu',serif;
  font-size:.75rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.faz-toggle:hover{border-color:var(--g1);color:var(--g2)}
.faz-body{
  width:100%;background:rgba(60,179,113,.06);
  border:1px solid rgba(60,179,113,.15);
  border-right:3px solid var(--g1);
  border-radius:12px;padding:.7rem .9rem;
  font-family:'Noto Nastaliq Urdu',serif;
  font-size:.85rem;color:#b0d8b0;
  direction:rtl;line-height:2.2;text-align:right;
  display:none;animation:fadeUp .2s ease;
}
.faz-body.open{display:block}

/* ring counter */
.ring-wrap{
  position:relative;width:170px;height:170px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
}
.ring-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);pointer-events:none}
.rbg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8}
.rfill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:477;stroke-dashoffset:477;transition:stroke-dashoffset .3s cubic-bezier(.4,0,.2,1)}
.ring-inner{
  position:absolute;inset:12px;
  background:radial-gradient(circle at 38% 32%,#102014,#030b04);
  border-radius:50%;
  border:1px solid rgba(60,179,113,.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:inset 0 0 22px rgba(0,0,0,.55);
  transition:transform .1s;
}
.ring-wrap:active .ring-inner{transform:scale(.93)}
.rnum{font-family:'Amiri',serif;font-size:2.9rem;font-weight:700;color:var(--gold2);line-height:1}
.rof{font-size:.75rem;color:var(--text2);margin-top:3px;direction:ltr}
.rhint{font-size:.55rem;color:rgba(110,160,110,.4);letter-spacing:2px;margin-top:5px;direction:ltr;text-transform:uppercase}

/* controls */
.controls{width:100%;display:flex;align-items:center;justify-content:space-between;gap:.55rem;direction:ltr}
.ctrl{
  background:rgba(60,179,113,.07);border:1px solid var(--bdr);
  color:var(--text2);border-radius:40px;padding:.48rem .9rem;
  font-size:.8rem;font-family:'Amiri',serif;cursor:pointer;transition:all .18s;
}
.ctrl:hover{background:rgba(60,179,113,.15);color:var(--g2);border-color:var(--g1)}
.ctrl:active{transform:scale(.95)}
.ctrl.next{background:rgba(60,179,113,.15);border-color:rgba(60,179,113,.4);color:var(--g2);padding:.48rem 1.3rem}
.ctrl.next:hover{background:rgba(60,179,113,.25)}
.ctrl:disabled{opacity:.25;cursor:not-allowed}

/* dam box */
.dam-box{
  width:100%;background:rgba(60,179,113,.08);
  border:1px solid rgba(60,179,113,.25);border-radius:14px;
  padding:.85rem 1rem;font-family:'Noto Nastaliq Urdu',serif;
  font-size:.9rem;color:#90f0b8;direction:rtl;line-height:2.2;text-align:right;
}

/* ── TASBEEH ── */
.tasbeeh-panel{
  width:100%;max-width:480px;padding:1rem .9rem;
  display:flex;flex-direction:column;align-items:center;gap:.9rem;
  animation:fadeUp .28s ease;
}
.tasbeeh-phases{display:flex;gap:.4rem;width:100%;direction:ltr}
.phase-chip{
  flex:1;padding:.42rem .3rem;border-radius:20px;
  border:1px solid var(--bdr);background:transparent;
  color:var(--text2);font-family:'Amiri',serif;
  font-size:.75rem;text-align:center;line-height:1.6;cursor:pointer;
  transition:all .22s;
}
.phase-chip.done{background:rgba(60,179,113,.15);border-color:var(--g1);color:var(--g2)}
.phase-chip.cur{border-color:var(--r-tasbeeh);background:rgba(236,72,153,.15);color:#fda4cf}

/* asr image */
.asr-img{
  width:100%;border-radius:16px;
  border:1px solid rgba(240,200,66,.25);
  box-shadow:0 0 30px rgba(240,200,66,.1);
}

/* ── KAHF ── */
.kahf-panel{
  position:relative;z-index:1;
  width:100%;max-width:480px;
  padding:.8rem .85rem 3rem;animation:fadeUp .28s ease;
}
.kahf-head{
  text-align:center;padding:1.1rem 1rem .9rem;
  border-bottom:1px solid var(--bdr);margin-bottom:.8rem;
}
.kahf-title{font-family:'Amiri',serif;font-size:1.6rem;color:var(--gold2);line-height:2.2;direction:rtl}
.kahf-sub{font-family:'Noto Nastaliq Urdu',serif;font-size:.8rem;color:var(--text2);direction:rtl;line-height:2;margin-top:.3rem}
.ruku-sep{
  text-align:center;margin:1.2rem 0 .5rem;
  font-family:'Amiri',serif;font-size:.75rem;color:var(--g1);letter-spacing:1.5px;direction:ltr;
}
.ruku-sep::before,.ruku-sep::after{content:'';display:inline-block;width:35px;height:1px;background:rgba(60,179,113,.25);vertical-align:middle;margin:0 7px}
.kahf-text{
  font-family:'Amiri',serif;font-size:1.3rem;line-height:2.6;
  color:#f0e8d5;direction:rtl;text-align:justify;
  padding:.3rem .2rem;word-break:break-word;
}

/* ── DRAWER ── */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.overlay.open{display:block}
.drawer{
  position:fixed;top:0;right:-100%;width:min(320px,87vw);height:100vh;
  background:#081509;border-left:1px solid var(--bdr);
  z-index:201;display:flex;flex-direction:column;
  padding:1.1rem .9rem;gap:.3rem;overflow-y:auto;
  transition:right .3s cubic-bezier(.4,0,.2,1);direction:rtl;
}
.drawer.open{right:0}
.dr-title{font-family:'Noto Nastaliq Urdu',serif;font-size:.95rem;color:var(--gold2);padding:.2rem 0 .7rem;border-bottom:1px solid var(--bdr);margin-bottom:.3rem;text-align:right}
.dr-item{
  display:flex;align-items:center;gap:.6rem;
  padding:.58rem .65rem;border-radius:11px;cursor:pointer;
  transition:background .18s;border:1px solid transparent;direction:rtl;
}
.dr-item:hover{background:rgba(60,179,113,.08);border-color:var(--bdr)}
.dr-item.active{background:rgba(60,179,113,.14);border-color:rgba(60,179,113,.35)}
.dr-icon{font-size:1.1rem;flex-shrink:0}
.dr-name{font-family:'Noto Nastaliq Urdu',serif;font-size:.9rem;color:var(--text);flex:1;text-align:right;line-height:1.7}
.dr-count{font-family:'Amiri',serif;font-size:.68rem;color:var(--g1);background:rgba(60,179,113,.1);border-radius:20px;padding:1px 6px;white-space:nowrap;direction:ltr}

/* ── COMPLETE ── */
.comp-screen{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.94);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;gap:.9rem}
.comp-screen.show{display:flex;animation:fadeUp .5s ease}
.comp-btn{background:rgba(60,179,113,.22);border:1px solid rgba(60,179,113,.45);color:var(--g2);border-radius:40px;padding:.65rem 1.8rem;font-family:'Noto Nastaliq Urdu',serif;font-size:.9rem;cursor:pointer;margin-top:.4rem;transition:background .2s}
.comp-btn:hover{background:rgba(60,179,113,.35)}

@keyframes pulse-g{0%{box-shadow:0 0 0 0 rgba(60,179,113,.35)}70%{box-shadow:0 0 0 15px rgba(60,179,113,0)}100%{box-shadow:0 0 0 0 rgba(60,179,113,0)}}
@keyframes pulse-p{0%{box-shadow:0 0 0 0 rgba(168,85,247,.35)}70%{box-shadow:0 0 0 15px rgba(168,85,247,0)}100%{box-shadow:0 0 0 0 rgba(168,85,247,0)}}
@keyframes pulse-t{0%{box-shadow:0 0 0 0 rgba(236,72,153,.35)}70%{box-shadow:0 0 0 15px rgba(236,72,153,0)}100%{box-shadow:0 0 0 0 rgba(236,72,153,0)}}
.ring-inner.pg{animation:pulse-g .33s ease-out}
.ring-inner.pp{animation:pulse-p .33s ease-out}
.ring-inner.pt{animation:pulse-t .33s ease-out}
</style>
</head>
<body>

<!-- CHIPS NAV -->
<div class="chips-wrap" id="chipsWrap">
  <div class="chips-row" id="chipsRow">
    <button class="chip active" data-sec="namaz">🕌 ہر نماز</button>
    <button class="chip" data-sec="fajr">🌅 فجر/مغرب</button>
    <button class="chip" data-sec="jumma">🌙 جمعہ</button>
    <button class="chip" data-sec="asr">☀️ عصر درود</button>
    <button class="chip" data-sec="kahf">📖 سورۃ الکہف</button>
    <button class="chip" data-sec="tauheed">☝️ توحید</button>
    <button class="chip" data-sec="tasbeeh">📿 تسبیح</button>
  </div>
  <button class="menu-btn" id="menuBtn">☰</button>
</div>
<div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>

<div id="mainContent" style="position:relative;z-index:1;width:100%;max-width:480px"></div>

<!-- DRAWER -->
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="dr-title">تمام اذکار</div>
  <div id="drList"></div>
  <div style="margin-top:auto;padding-top:1rem;direction:ltr">
    <button class="ctrl" style="width:100%" id="closeDrawer">✕ بند کریں</button>
  </div>
</div>

<!-- COMPLETE -->
<div class="comp-screen" id="compScreen">
  <div style="font-size:3rem">🌿</div>
  <div style="font-family:'Amiri',serif;font-size:1.5rem;color:var(--gold2);direction:rtl;line-height:2">اَلْحَمْدُ لِلَّهِ</div>
  <div style="font-family:'Noto Nastaliq Urdu',serif;font-size:1.1rem;color:var(--g2);line-height:2" id="compMsg"></div>
  <button class="comp-btn" id="restartBtn">↺ دوبارہ شروع کریں</button>
</div>

<!-- Offline Quran Data -->
<script src="data/quran.js"></script>
<script src="data/quran-kahf.js"></script>

<script>
// ════════════════════════════════════════════════
// QURAN LOADER (inline - no extra file needed)
// ════════════════════════════════════════════════
window.renderQuranHTML = function(key, element) {
  if (!element || !window.QURAN) return;
  const html = window.QURAN[key];
  if (html) {
    element.innerHTML = html;
  } else if (key === '18') {
    // Kahf loaded from separate file
    setTimeout(() => {
      if (window.QURAN && window.QURAN['18']) {
        element.innerHTML = window.QURAN['18'];
      }
    }, 100);
  }
};

// ════════════════════════════════════════════════
// DATA (with isQuran flags for offline loading)
// ════════════════════════════════════════════════

/* SECTION 1 — ہر نماز کے بعد */
const NAMAZ = [
  {

    faz:'ہر بھلائی کا آغاز اللہ کے نام سے — یہ برکت اور رحمت کا دروازہ کھولتا ہے۔'
  },
  {
    name:'آيَةُ الْكُرْسِيّ', target:1, isQuran:true, quranKey:'2:255',
    arabic:`اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ`,
    faz:'قرآن کی سب سے عظیم آیت۔ ہر فرض نماز کے بعد پڑھنے والے اور جنت کے درمیان صرف موت حائل ہے۔'
  },
  {
    name:'سورۃ الحشر — آخری ۳ آیات', target:1, isQuran:true, quranKey:'59:22-24',
    arabic:`هُوَ اللَّهُ الَّذِي لَا إِلَٰهَ إِلَّا هُوَ ۖ عَالِمُ الْغَيْبِ وَالشَّهَادَةِ ۖ هُوَ الرَّحْمَٰنُ الرَّحِيمُ ﴿٢٢﴾\nهُوَ اللَّهُ الَّذِي لَا إِلَٰهَ إِلَّا هُوَ الْمَلِكُ الْقُدُّوسُ السَّلَامُ الْمُؤْمِنُ الْمُهَيْمِنُ الْعَزِيزُ الْجَبَّارُ الْمُتَكَبِّرُ ۚ سُبْحَانَ اللَّهِ عَمَّا يُشْرِكُونَ ﴿٢٣﴾\nهُوَ اللَّهُ الْخَالِقُ الْبَارِئُ الْمُصَوِّرُ ۖ لَهُ الْأَسْمَاءُ الْحُسْنَىٰ ۚ يُسَبِّحُ لَهُ مَا فِي السَّمَاوَاتِ وَالْأَرْضِ ۖ وَهُوَ الْعَزِيزُ الْحَكِيمُ ﴿٢٤﴾`,
    faz:'صبح پڑھنے پر ۷۰ ہزار فرشتے شام تک دعائے مغفرت کرتے ہیں۔ اس دن وفات ہو تو شہید کا درجہ ملتا ہے۔'
  },
  {
    name:'شرکِ خفی سے حفاظت', target:3,
    arabic:`اللَّهُمَّ إِنِّي أَعُوذُ بِكَ أَنْ أُشْرِكَ بِكَ وَأَنَا أَعْلَمُ، وَأَسْتَغْفِرُكَ لِمَا لَا أَعْلَمُ`,
    faz:'ریاکاری اور چھوٹے شرک سے حفاظت۔ یہ کلمۂ توحید کی تکمیل کرتی ہے اور بندے کو پاک رکھتی ہے۔'
  },
  {
    name:'شیطان سے پناہ', target:3,
    arabic:`أَعُوذُ بِاللَّهِ السَّمِيعِ الْعَلِيمِ مِنَ الشَّيْطَانِ الرَّجِيمِ`,
    faz:'اللہ شیطان کے وسوسوں، تکبر اور فتنوں سے بچاتا ہے — یہ مسنون دعا ہے۔'
  },

const CIRC=2*Math.PI*76;

// ════ RENDER ════
function render(){
  document.querySelectorAll('.chip').forEach(c=>{
    c.classList.toggle('active',c.dataset.sec===sec);
  });

  const mc = document.getElementById('mainContent');

  if(sec==='kahf')   { renderKahf(mc); return; }
  if(sec==='asr')    { renderAsr(mc);  return; }
  if(sec==='tasbeeh'){ renderTasbeeh(mc); return; }

  const meta = SECTIONS_META.find(s=>s.id===sec);
  const steps = meta.data;
  const st = S[sec];
  const step = steps[st.idx];
  const total = steps.length;
  const count = st.cnt;
  const pct = Math.min(count/step.target,1);
  const offset = CIRC*(1-pct);
  const done = count>=step.target;

  document.getElementById('progFill').style.width=((st.idx+(done?1:count/step.target))/total*100)+'%';

  let h = `<div class="step-panel">
    <div class="sec-badge">
      <div class="sec-dot" style="background:${meta.color}"></div>
      <span>${meta.icon} ${meta.title} — ${st.idx+1} از ${total}</span>
      <div class="sec-dot" style="background:${meta.color}"></div>
    </div>`;

  // dam step
  if(step.isDm){
    h+=`<div class="dam-box">
      <strong>🫁 دَم کریں</strong><br/><br/>
      ہاتھوں پر پھونک کر پہلے اپنے آپ پر دَم کریں — ہاتھ پورے جسم پر پھیریں۔<br/>
      پھر گھر والوں پر دَم کریں۔ اگر غائب ہوں تو دل میں خیال لا کر دَم کریں۔
    </div>
    <div style="margin:.3rem 0">
      <div id="dmBtn" style="width:120px;height:120px;margin:0 auto;border-radius:50%;background:radial-gradient(circle at 35% 30%,#102014,#030b04);border:1px solid rgba(60,179,113,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer">
        ${done?`<div style="font-size:1.8rem">✅</div><div style="font-size:.7rem;color:var(--g2);margin-top:3px">مکمل</div>`:`<div style="font-size:1.9rem">🫁</div><div style="font-size:.65rem;color:var(--text2);margin-top:3px">تسلیم کریں</div>`}
      </div>
    </div>`;
  } else {
    // ---- QURAN vs NON-QURAN RENDERING ----
    h+=`<div class="dua-card">
      <div class="arabic" ${step.isQuran ? 'id="quranVerse"' : ''}>${step.isQuran ? '' : step.arabic.replace(/\n/g,'<br/><br/>')}</div>
      <div class="dua-name">${step.name} — ${step.target>1?`×${step.target}`:'یک مرتبہ'}</div>
    </div>
    <button class="faz-toggle" onclick="toggleFaz(this)">
      <span>✨</span> فضیلت دیکھیں
    </button>
    <div class="faz-body">${step.faz}</div>`;

    // ring
    h+=`<div class="ring-wrap" id="rw">
      <svg viewBox="0 0 176 176">
        <circle class="rbg" cx="88" cy="88" r="76"/>
        <circle class="rfill" id="rf" cx="88" cy="88" r="76"
          style="stroke:${meta.color};stroke-dashoffset:${offset}"/>
      </svg>
      <div class="ring-inner" id="ri">
        ${done
          ?`<div style="font-size:1.5rem">✅</div><div class="rof">مکمل</div>`
          :`<div class="rnum" id="rn">${count}</div>
            <div class="rof">از ${step.target}</div>
            <div class="rhint">tap to count</div>`}
      </div>
    </div>`;
  }

  const isLast = st.idx===total-1;
  h+=`<div class="controls">
    <button class="ctrl" id="prevB" ${st.idx===0?'disabled':''}>← پچھلا</button>
    <button class="ctrl" id="undoB">↩</button>
    <button class="ctrl next" id="nextB">${done?(isLast?'🌿 ختم':'اگلا →'):'آگے →'}</button>
  </div></div>`;

  mc.innerHTML=h;
  mc.style.animation='none'; void mc.offsetWidth;

  // Load Quran tajweed HTML if this is a Quranic verse
  if(step.isQuran && step.quranKey) {
    const quranEl = document.getElementById('quranVerse');
    if(quranEl && window.QURAN) {
      renderQuranHTML(step.quranKey, quranEl);
    }
  }

  document.getElementById('rw')?.addEventListener('click',tap);
  document.getElementById('dmBtn')?.addEventListener('click',()=>{if(!done){S[sec].done[st.idx]=true;save();render();}});
  document.getElementById('prevB')?.addEventListener('click',()=>{if(st.idx>0){st.idx--;st.cnt=0;save();render();}});
  document.getElementById('undoB')?.addEventListener('click',doUndo);
  document.getElementById('nextB')?.addEventListener('click',goNext);
  renderDrawer();
}

function renderAsr(mc){
  const cnt=S.asr.cnt, target=80, done=S.asr.done;
  const pct=Math.min(cnt/target,1), offset=CIRC*(1-pct);
  document.getElementById('progFill').style.width=(pct*100)+'%';

  mc.innerHTML=`<div class="step-panel">
    <div class="sec-badge">
      <div class="sec-dot" style="background:var(--r-asr)"></div>
      <span>☀️ جمعہ عصر کے بعد — ۸۰ مرتبہ</span>
      <div class="sec-dot" style="background:var(--r-asr)"></div>
    </div>
    <div class="urdu-note" style="border-right-color:var(--r-asr)">
      جمعہ کے دن نمازِ عصر کے بعد جگہ سے اٹھنے سے پہلے ۸۰ مرتبہ پڑھیں — ۸۰ سال کے گناہ معاف، ۸۰ سال کا ثواب
    </div>
    <img class="asr-img" src="${ASR_IMG}" alt="درودِ نبی اُمّی" loading="lazy"/>
    <div class="ring-wrap" id="rw">
      <svg viewBox="0 0 176 176">
        <circle class="rbg" cx="88" cy="88" r="76"/>
        <circle class="rfill" id="rf" cx="88" cy="88" r="76"
          style="stroke:var(--r-asr);stroke-dashoffset:${offset}"/>
      </svg>
      <div class="ring-inner" id="ri">
        ${done
          ?`<div style="font-size:1.5rem">✅</div><div class="rof" style="color:var(--gold2)">مکمل!</div>`
          :`<div class="rnum" id="rn" style="color:var(--gold2)">${cnt}</div>
            <div class="rof">از ۸۰</div>
            <div class="rhint">tap to count</div>`}
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" onclick="doUndo()">↩ واپس</button>
      <button class="ctrl next" style="border-color:rgba(240,200,66,.4);color:var(--gold2)" onclick="resetAsr()">↺ دوبارہ</button>
    </div>
  </div>`;
  document.getElementById('rw').addEventListener('click',tap);
  renderDrawer();
}

function renderTasbeeh(mc){
  const ph=S.tasbeeh.phase, cnt=S.tasbeeh.cnt;
  const phase=TASBEEH_PHASES[ph];
  const target=phase.target, pct=Math.min(cnt/target,1), offset=CIRC*(1-pct);
  const done=cnt>=target;
  document.getElementById('progFill').style.width=((ph+(done?1:pct))/3*100)+'%';

  const chips = TASBEEH_PHASES.map((p,i)=>`
    <div class="phase-chip ${i<ph?'done':''} ${i===ph?'cur':''}" style="${i===ph?`border-color:${p.color};color:${p.color}`:''}">
      ${i<ph?'✓ ':''}<span style="font-family:'Amiri',serif;font-size:1rem">${p.arabic}</span><br/>
      <span style="font-size:.6rem">${p.urdu} ×${p.target}</span>
    </div>`).join('');

  mc.innerHTML=`<div class="tasbeeh-panel">
    <div class="sec-badge">
      <div class="sec-dot" style="background:var(--r-tasbeeh)"></div>
      <span>📿 تسبیحِ فاطمہؓ — مرحلہ ${ph+1} از ۳</span>
      <div class="sec-dot" style="background:var(--r-tasbeeh)"></div>
    </div>
    <div class="tasbeeh-phases" dir="ltr">${chips}</div>
    <div class="dua-card" style="border-color:rgba(236,72,153,.2)">
      <div class="arabic xl" style="color:#fce7f3">${phase.arabic}</div>
      <div class="dua-name" style="color:#f0abcf">${phase.urdu} — ×${target}</div>
    </div>
    <div class="faz-body open" style="display:block">
      نبی کریم ﷺ نے سیدہ فاطمہؓ اور حضرت علیؓ کو یہ تسبیح سکھائی جب انہوں نے خادم مانگا۔ فرمایا: یہ خادم سے بہتر ہے — تھکاوٹ دور ہوتی ہے، طاقت ملتی ہے۔ (صحیح بخاری و مسلم)
    </div>
    <div class="ring-wrap" id="rw">
      <svg viewBox="0 0 176 176">
        <circle class="rbg" cx="88" cy="88" r="76"/>
        <circle class="rfill" id="rf" cx="88" cy="88" r="76"
          style="stroke:${phase.color};stroke-dashoffset:${offset}"/>
      </svg>
      <div class="ring-inner" id="ri" style="border-color:rgba(236,72,153,.2)">
        ${done
          ?`<div style="font-size:1.5rem">✅</div><div class="rof">مکمل</div>`
          :`<div class="rnum" id="rn" style="color:${phase.color}">${cnt}</div>
            <div class="rof">از ${target}</div>
            <div class="rhint">tap to count</div>`}
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" onclick="doUndo()">↩</button>
      <button class="ctrl next" style="border-color:rgba(236,72,153,.4);color:#fda4cf" id="nextB">
        ${done?(ph===2?'🌿 ختم':'اگلا ←'):'آگے →'}
      </button>
    </div>
  </div>`;
  document.getElementById('rw').addEventListener('click',tap);
  document.getElementById('nextB').addEventListener('click',()=>{
    if(done){
      if(ph===2){
        document.getElementById('compMsg').textContent='ماشاءاللہ! تسبیحِ فاطمہؓ مکمل ہوگئی 📿';
        document.getElementById('compScreen').classList.add('show');
      } else {
        S.tasbeeh.phaseDone[ph]=true;
        S.tasbeeh.phase++;
        S.tasbeeh.cnt=0;
        save();render();
      }
    }
  });
  renderDrawer();
}

function renderKahf(mc){
  document.getElementById('progFill').style.width='100%';
  
  let h=`<div class="kahf-panel">
    <div class="kahf-head">
      <div class="kahf-title">سُورَةُ الْكَهْفِ</div>
      <div class="kahf-sub">مکمل سورۃ — ۱۱۰ آیات — ۱۲ رکوع<br/>ہر جمعہ تلاوت سنت ہے — اوپر سے نیچے سکرول کریں</div>
    </div>`;
  
  // Use offline Quran data for Kahf
  if(window.QURAN && window.QURAN['18']) {
    // Split by Bismillah or verse markers to create ruku sections
    const fullHtml = window.QURAN['18'];
    h += `<div class="kahf-text">${fullHtml}</div>`;
  } else {
    // Fallback: show loading message
    h += `<div class="kahf-text" style="text-align:center;padding:2rem;">
      <p>لوڈ ہو رہا ہے... براہ کرم چند لمحے انتظار کریں</p>
      <p style="font-size:0.8rem;color:var(--text2);margin-top:1rem;">
        اگر آف لائن ڈیٹا موجود نہیں ہے تو node scripts/build-quran.js چلائیں
      </p>
    </div>`;
  }
  
  h+=`<div style="text-align:center;padding:2rem 0 .5rem;font-family:'Amiri',serif;font-size:1.1rem;color:var(--gold2);direction:rtl;line-height:2">۞ صَدَقَ اللَّهُ الْعَظِيمُ ۞</div></div>`;
  mc.innerHTML=h;
  renderDrawer();
}

// ════ TAP ════
function tap(){
  const isTasbeeh=sec==='tasbeeh', isAsr=sec==='asr';
  let cnt,target,color='var(--r-namaz)';

  if(isAsr){
    if(S.asr.done) return;
    cnt=S.asr.cnt; target=80; color='var(--r-asr)';
  } else if(isTasbeeh){
    const ph=S.tasbeeh.phase;
    if(S.tasbeeh.cnt>=TASBEEH_PHASES[ph].target) return;
    cnt=S.tasbeeh.cnt; target=TASBEEH_PHASES[ph].target; color=TASBEEH_PHASES[ph].color;
  } else {
    const st=S[sec]; const step=SECTIONS_META.find(s=>s.id===sec).data[st.idx];
    if(st.cnt>=step.target) return;
    cnt=st.cnt; target=step.target; color=SECTIONS_META.find(s=>s.id===sec).color;
  }

  if(cnt>=target) return;

  // increment
  if(isAsr) S.asr.cnt++;
  else if(isTasbeeh) S.tasbeeh.cnt++;
  else S[sec].cnt++;
  save();

  beep(isTasbeeh?660:isAsr?800:780,.08); vib(20);

  const ri=document.getElementById('ri');
  if(ri){ ri.classList.remove('pg','pp','pt'); void ri.offsetWidth;
    ri.classList.add(isTasbeeh?'pt':sec==='jumma'?'pp':'pg'); }

  const nc=isAsr?S.asr.cnt:isTasbeeh?S.tasbeeh.cnt:S[sec].cnt;
  document.getElementById('rn')&&(document.getElementById('rn').textContent=nc);
  document.getElementById('rf')&&(document.getElementById('rf').style.strokeDashoffset=CIRC*(1-nc/target));

  if(nc>=target){
    beep(isTasbeeh?520:600,.3,.25); vib([40,30,70]);
    if(isAsr) S.asr.done=true;
    else if(isTasbeeh) { /* handled by next button */ }
    else { S[sec].done[S[sec].idx]=true; }
    save(); setTimeout(render,320);
  }
}

function doUndo(){
  if(sec==='asr'){if(S.asr.cnt>0){S.asr.cnt--;S.asr.done=false;save();render();}}
  else if(sec==='tasbeeh'){if(S.tasbeeh.cnt>0){S.tasbeeh.cnt--;save();render();}}
  else{const st=S[sec];if(st.cnt>0){st.cnt--;st.done[st.idx]=false;save();render();}}
}
function resetAsr(){S.asr={cnt:0,done:false};save();render();}

function goNext(){
  const steps=SECTIONS_META.find(s=>s.id===sec).data;
  const st=S[sec];
  if(st.idx===steps.length-1){
    document.getElementById('compMsg').textContent={
      namaz:'ماشاءاللہ! ہر نماز کے بعد کے اذکار مکمل 🌿',
      fajr:'ماشاءاللہ! فجر/مغرب کے اذکار مکمل 🌅',
      jumma:'ماشاءاللہ! جمعہ کا وِرد مکمل ہوگیا 🌙',
      tauheed:'ماشاءاللہ! توحید کی دعا مکمل ☝️'
    }[sec]||'اَلْحَمْدُ لِلَّهِ';
    document.getElementById('compScreen').classList.add('show');
  } else {
    st.idx++; st.cnt=0; save(); render();
  }
}

function toggleFaz(btn){
  const body=btn.nextElementSibling;
  body.classList.toggle('open');
  if(body.classList.contains('open')){
    btn.innerHTML='<span>▲</span> فضیلت چھپائیں';
  } else {
    btn.innerHTML='<span>✨</span> فضیلت دیکھیں';
  }
}

// ════ DRAWER ════
function renderDrawer(){
  const list=document.getElementById('drList');
  let h='';
  SECTIONS_META.forEach(sm=>{
    const isActive=sec===sm.id;
    let countText='';
    if(sm.id==='asr') countText='×۸۰';
    else if(sm.id==='kahf') countText='۱۱۰';
    else if(sm.id==='tasbeeh') countText='۳+۳+۳';
    else countText=`${sm.data.length} اذکار`;
    h+=`<div class="dr-item${isActive?' active':''}" data-sec="${sm.id}">
      <span class="dr-icon">${sm.icon}</span>
      <span class="dr-name">${sm.title}</span>
      <span class="dr-count" style="color:${sm.color}">${countText}</span>
    </div>`;
  });
  list.innerHTML=h;
  list.querySelectorAll('.dr-item').forEach(el=>{
    el.addEventListener('click',()=>{
      sec=el.dataset.sec; save(); closeDrawer(); render(); window.scrollTo(0,0);
    });
  });
}

document.getElementById('menuBtn').addEventListener('click',()=>{
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderDrawer();
});
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('overlay').addEventListener('click',closeDrawer);
document.getElementById('closeDrawer').addEventListener('click',closeDrawer);

document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{sec=c.dataset.sec;save();render();window.scrollTo(0,0);});
});

document.getElementById('restartBtn').addEventListener('click',()=>{
  if(sec==='namaz')   S.namaz  ={idx:0,cnt:0,done:new Array(NAMAZ.length).fill(false)};
  if(sec==='fajr')    S.fajr   ={idx:0,cnt:0,done:new Array(FAJR.length).fill(false)};
  if(sec==='jumma')   S.jumma  ={idx:0,cnt:0,done:new Array(JUMMA.length).fill(false)};
  if(sec==='asr')     S.asr    ={cnt:0,done:false};
  if(sec==='tauheed') S.tauheed={idx:0,cnt:0,done:[false]};
  if(sec==='tasbeeh') S.tasbeeh={phase:0,cnt:0,phaseDone:[false,false,false]};
  save();
  document.getElementById('compScreen').classList.remove('show');
  render();
});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();tap();}
  if(e.code==='Backspace') doUndo();
  if(e.code==='ArrowRight') document.getElementById('nextB')?.click();
  if(e.code==='ArrowLeft')  document.getElementById('prevB')?.click();
});

render();
</script>
</body>
</html>
